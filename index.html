<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulatore Provvigioni FuturENERGY</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background-color: #f4f7f6; color: #333; padding: 20px; }
.container { max-width: 1000px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.logo-container { text-align: center; margin-bottom: 20px; }
.logo-container img { max-width: 280px; height: auto; }
h1 { color: #006037; text-align: center; margin-bottom: 30px; font-size: 2rem; border-bottom: 2px solid #006037; padding-bottom: 10px; }
h3 { background: #006037; color: #fff; padding: 10px 15px; border-radius: 4px; margin-top: 25px; }
h4 { color: #006037; margin-top: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: 600; margin-bottom: 5px; color: #555; font-size: 0.95rem; }
input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
input:focus, select:focus { border-color: #006037; outline: none; box-shadow: 0 0 5px rgba(0,96,55,0.2); }
.business-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
.btn-add { background: #e8f5e9; color: #006037; border: 1px solid #006037; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.9rem; margin-top: 5px; }
.btn-add:hover { background: #006037; color: #fff; }
.btn-remove { background: #ffebee; color: #c62828; border: 1px solid #c62828; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
.btn-remove:hover { background: #c62828; color: #fff; }
.btn-calcola { width: 100%; padding: 15px; background: #006037; color: white; border: none; border-radius: 4px; font-size: 1.3rem; font-weight: bold; cursor: pointer; margin-top: 30px; transition: background 0.2s; }
.btn-calcola:hover { background: #004d2c; }
.risultati { margin-top: 40px; border: 2px solid #006037; border-radius: 6px; padding: 25px; background: #fff; display: none; }
.risultati h2 { color: #006037; text-align: center; margin-top: 0; font-size: 1.8rem; }
.box-info { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
.box-info p { margin: 10px 0; font-size: 1.05rem; display: flex; justify-content: space-between; }
.box-proiezione { background: #edf7f1; border: 1px solid #c8e6c9; border-radius: 4px; padding: 20px; }
.box-proiezione ul { padding-left: 20px; margin: 10px 0; }
.box-proiezione li { margin-bottom: 8px; font-size: 1rem; }
.coordinator-only, .account-only { display: none; }
.highlight { font-weight: bold; color: #006037; }
.success { color: #2e7d32; font-weight: bold; }
.valore { font-weight: bold; color: #333; }
.opzioni-gare { margin-top: 20px; background: #fafafa; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
.opzioni-gare label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: normal; }
.opzioni-gare input[type="checkbox"] { width: auto; }
</style>
</head>
<body>










    <script>
        // Tabelle Provvigionali fisse
        const tabelle = {
            sky: {
                "TRIPLE_PLAY": {diretta: 95, indiretta: 9.5},
                "SKY_WIFI_RID": {diretta: 40, indiretta: 4},
                "SKY_WIFI_PREPAGATA": {diretta: 30, indiretta: 3},
                "BUSINESS_BAR": {diretta: 125, indiretta: 12.5},
                "HOTEL_FINO_A_3_CAMERE": {diretta: 100, indiretta: 10},
                "HOTEL_ANNUALE": {diretta: 30, indiretta: 3},
                "HOTEL_STAGIONALE": {diretta: 36, indiretta: 3.6}
            },
            prodotti: {
                "FOTOVOLTAICO": {diretta: 0.05, indiretta: 0.015},
                "LED_LISTINO_4": {diretta: 0.20, indiretta: 0.03},
                "LED_LISTINO_3": {diretta: 0.15, indiretta: 0.03},
                "LED_LISTINO_2": {diretta: 0.10, indiretta: 0.025},
                "LED_LISTINO_1": {diretta: 0.07, indiretta: 0.02},
                "CLIMA": {diretta: 0.08, indiretta: 0.02},
                "COLONNINE_LISTINO_3": {diretta: 0.10, indiretta: 0.025},
                "COLONNINE_LISTINO_2": {diretta: 0.085, indiretta: 0.02},
                "COLONNINE_LISTINO_1": {diretta: 0.07, indiretta: 0.015},
                "EBIKE": {diretta: 0.07, indiretta: 0.02}
            }
        };

        let globale_totDiretta_Base = 0;
        let globale_totIndiretta = 0;
        let globale_contributo = 0;

        function cambiaRuolo() {
            // Bloccato su Coordinator come da accordi di ieri mattina
            document.getElementById('ruolo').value = "coordinator";
            document.querySelectorAll('.coordinator-only').forEach(el => el.style.display = 'block');
            document.querySelectorAll('.account-only').forEach(el => el.style.display = 'none');
            
            document.getElementById('label-mandato').innerText = "COORDINATOR";
            document.getElementById('risultati-box').style.display = 'none';
        }

        function aggiungiRigaBusiness(id, placeholderText) {
            const container = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'business-item';
            div.innerHTML = `
                <input type="number" class="consumo-business" placeholder="${placeholderText}">
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        function aggiungiRigaSky(id) {
            const container = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'business-item';
            
            let optionsHtml = '';
            for (const key in tabelle.sky) {
                optionsHtml += `<option value="${key}">${key.replace(/_/g, ' ')}</option>`;
            }
            
            div.innerHTML = `
                <select class="tipo-sky" style="flex: 2;">${optionsHtml}</select>
                <input type="number" class="qta-sky" value="1" style="flex: 0.5;" placeholder="Q.tà">
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        function aggiungiRigaProdotto(id) {
            const container = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'business-item';
            
            let optionsHtml = '';
            for (const key in tabelle.prodotti) {
                optionsHtml += `<option value="${key}">${key.replace(/_/g, ' ')}</option>`;
            }
            
            div.innerHTML = `
                <select class="tipo-prodotto" style="flex: 2;">${optionsHtml}</select>
                <input type="number" class="valore-prodotto" style="flex: 1;" placeholder="Valore Commessa €">
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        // SCAGLIONI RICORRENTI DIRETTI BUSINESS (Come da documento)
        function getRicorrenteLuceBus(kwh) {
            if (kwh <= 5000) return 10.00;
            if (kwh <= 10000) return 12.50;
            if (kwh <= 25000) return 15.00;
            if (kwh <= 50000) return 16.50;
            if (kwh <= 100000) return 18.50;
            if (kwh <= 300000) return 22.50;
            if (kwh <= 500000) return 30.00;
            if (kwh <= 700000) return 40.00;
            return 75.00;
        }

        function getRicorrenteGasBus(smc) {
            if (smc <= 1500) return 5.00;
            if (smc <= 5000) return 10.00;
            if (smc <= 10000) return 12.50;
            if (smc <= 20000) return 15.00;
            if (smc <= 30000) return 18.50;
            if (smc <= 100000) return 22.50;
            if (smc <= 200000) return 30.00;
            if (smc <= 300000) return 40.00;
            if (smc <= 400000) return 75.00;
            return 125.00;
        }

        function calcolaProvvigioni() {
            globale_totDiretta_Base = 0;
            globale_totIndiretta = 0;
            globale_contributo = 0;
            
            let ricMaturatoMesePersonale = 0;
            let volumeLuceTotale = 0;
            let volumeGasTotale = 0;

            // --- PRODUZIONE DIRETTA ---
            const pRes = parseInt(document.getElementById('p-res').value) || 0;
            const pResR = parseInt(document.getElementById('p-res-r').value) || 0;
            globale_totDiretta_Base += (pRes * 50) + (pResR * 70);
            ricMaturatoMesePersonale += (pRes + pResR) * 4; // Ricorrente Residenziale Fisso
            volumeLuceTotale += (pRes + pResR) * 3000; 

            const bLuceInputs = document.querySelectorAll('#p-bus-container .consumo-business');
            bLuceInputs.forEach(input => {
                let v = parseFloat(input.value) || 0;
                globale_totDiretta_Base += 50; // Gettone base fittizio per calcolo rapido diretta
                ricMaturatoMesePersonale += getRicorrenteLuceBus(v); // Ricorrente da tabella
                volumeLuceTotale += v;
            });

            const gRes = parseInt(document.getElementById('g-res').value) || 0;
            const gResR = parseInt(document.getElementById('g-res-r').value) || 0;
            globale_totDiretta_Base += (gRes * 50) + (gResR * 70);
            ricMaturatoMesePersonale += (gRes + gResR) * 4;
            volumeGasTotale += (gRes + gResR) * 1000;

            const bGasInputs = document.querySelectorAll('#g-bus-container .consumo-business');
            bGasInputs.forEach(input => {
                let v = parseFloat(input.value) || 0;
                globale_totDiretta_Base += 40; 
                ricMaturatoMesePersonale += getRicorrenteGasBus(v);
                volumeGasTotale += v;
            });

            // Sky e Prodotti Diretti
            const skyRighe = document.querySelectorAll('#sky-container .business-item');
            skyRighe.forEach(riga => {
                const tipo = riga.querySelector('.tipo-sky').value;
                const qta = parseInt(riga.querySelector('.qta-sky').value) || 0;
                globale_totDiretta_Base += qta * tabelle.sky[tipo].diretta;
            });

            const prodRighe = document.querySelectorAll('#prodotti-container .business-item');
            prodRighe.forEach(riga => {
                const tipo = riga.querySelector('.tipo-prodotto').value;
                const valoreCommessa = parseFloat(riga.querySelector('.valore-prodotto').value) || 0;
                globale_totDiretta_Base += valoreCommessa * tabelle.prodotti[tipo].diretta;
            });

            globale_totDiretta_Base += (parseInt(document.getElementById('c-bus').value) || 0) * 13;
            globale_totDiretta_Base += (parseInt(document.getElementById('verisure-qta').value) || 0) * 75;

            // --- PRODUZIONE RETE (INDIRETTA) ---
            let indEeGas = 0;
            let indAltri = 0;

            const piRes = parseInt(document.getElementById('p-ind-res').value) || 0;
            const piResKwh = parseFloat(document.getElementById('p-ind-res-kwh').value) || 0;
            indEeGas += (piRes * 6);
            volumeLuceTotale += piResKwh;
            
            const piResR = parseInt(document.getElementById('p-ind-resr').value) || 0;
            const piResRKwh = parseFloat(document.getElementById('p-ind-resr-kwh').value) || 0;
            indEeGas += (piResR * 10);
            volumeLuceTotale += piResRKwh;

            const piBusPezzi = parseInt(document.getElementById('p-ind-bus-pezzi').value) || 0;
            const piBusKwh = parseFloat(document.getElementById('p-ind-bus-kwh').value) || 0;
            volumeLuceTotale += piBusKwh;
            indEeGas += (piBusPezzi * 15); // Media sovrascrittura fissa usata ieri mattina

            const giRes = parseInt(document.getElementById('g-ind-res').value) || 0;
            const giResSmc = parseFloat(document.getElementById('g-ind-res-smc').value) || 0;
            indEeGas += (giRes * 6);
            volumeGasTotale += giResSmc;

            const giResR = parseInt(document.getElementById('g-ind-resr').value) || 0;
            const giResRSmc = parseFloat(document.getElementById('g-ind-resr-smc').value) || 0;
            indEeGas += (giResR * 10);
            volumeGasTotale += giResRSmc;

            const giBusPezzi = parseInt(document.getElementById('g-ind-bus-pezzi').value) || 0;
            const giBusSmc = parseFloat(document.getElementById('g-ind-bus-smc').value) || 0;
            volumeGasTotale += giBusSmc;
            indEeGas += (giBusPezzi * 15);

            const skyIndRighe = document.querySelectorAll('#sky-ind-container .business-item');
            skyIndRighe.forEach(riga => {
                const tipo = riga.querySelector('.tipo-sky').value;
                const qta = parseInt(riga.querySelector('.qta-sky').value) || 0;
                indAltri += qta * tabelle.sky[tipo].indiretta;
            });

            const prodIndRighe = document.querySelectorAll('#prodotti-ind-container .business-item');
            prodIndRighe.forEach(riga => {
                const tipo = riga.querySelector('.tipo-prodotto').value;
                const valoreCommessa = parseFloat(riga.querySelector('.valore-prodotto').value) || 0;
                indAltri += valoreCommessa * tabelle.prodotti[tipo].indiretta;
            });

            indAltri += (parseInt(document.getElementById('verisure-ind-qta').value) || 0) * 8;

            globale_totIndiretta = indEeGas + indAltri;

            // Ricorrente Indiretto Standard (0.5€/MW luce e 0.0035€/smc gas)
            let ricIndMensile = ((volumeLuceTotale * 0.0005) + (volumeGasTotale * 0.0035)) / 12;

            // Calcolo Volume Globale GWh (REGOLE DA MANDATO: 1 SMC = 4 KWh)
            let volGwh = (volumeLuceTotale + (volumeGasTotale * 4)) / 1000000;
            
            // CONTRIBUTI MENSILI REALI (Da Pagina 6 del PDF)
            if (volGwh >= 2.0) globale_contributo = 1000;
            else if (volGwh >= 1.5) globale_contributo = 750;
            else if (volGwh >= 1.0) globale_contributo = 500;
            else globale_contributo = 0;

            // --- OUTPUT ---
            document.getElementById('tot-diretta').innerText = globale_totDiretta_Base.toFixed(2).replace('.', ',') + " €";
            document.getElementById('tot-indiretta').innerText = globale_totIndiretta.toFixed(2).replace('.', ',') + " €";
            document.getElementById('ind-ee-gas').innerText = indEeGas.toFixed(2).replace('.', ',') + " €";
            document.getElementById('ind-altri').innerText = indAltri.toFixed(2).replace('.', ',') + " €";
            document.getElementById('tot-contributo').innerText = globale_contributo.toFixed(2).replace('.', ',') + " €";
            
            document.getElementById('ric-ind-ee-gas').innerText = ricIndMensile.toFixed(2).replace('.', ',');
            document.getElementById('tot-ric-annuale').innerText = (ricMaturatoMesePersonale * 4).toFixed(2).replace('.', ','); // Annualizzato
            document.getElementById('volume-calcolato').innerText = volGwh.toFixed(3) + " GWh";

            let baseMese = globale_totDiretta_Base + globale_totIndiretta + globale_contributo;

            document.getElementById('fat-m1m2').innerText = baseMese.toFixed(2).replace('.', ',') + " €";
            document.getElementById('fat-m3').innerText = (baseMese + ricIndMensile).toFixed(2).replace('.', ',') + " €";
            
            let ricTrim = ricMaturatoMesePersonale;
            document.getElementById('fat-m4').innerText = (baseMese + (ricIndMensile * 2) + ricTrim).toFixed(2).replace('.', ',') + " €";
            document.getElementById('ric-dir-1').innerText = ricTrim.toFixed(2).replace('.', ',');
            
            document.getElementById('fat-m7').innerText = (baseMese + (ricIndMensile * 5) + (ricTrim * 2)).toFixed(2).replace('.', ',') + " €";
            document.getElementById('ric-dir-2').innerText = (ricTrim * 2).toFixed(2).replace('.', ',');

            document.getElementById('totale-guadagno').innerText = baseMese.toFixed(2).replace('.', ',');
            
            document.getElementById('risultati-box').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        cambiaRuolo();
    </script>
